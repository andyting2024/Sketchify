[theme]
primaryColor = "#00d4ff"
backgroundColor = "#0a0e1a"
secondaryBackgroundColor = "#1a1f2e"
textColor = "#ffffff"
font = "sans serif"
base = "dark"

[server]
headless = true
maxUploadSize = 100
maxMessageSize = 100

[browser]
gatherUsageStats = false

[logger]
level = "info"

[client]
showErrorDetails = "none"